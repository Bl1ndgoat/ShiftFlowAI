<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shift - Front Office Logbook</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: {
                            50: '#FDFBF7',
                            100: '#FAF6EE',
                            200: '#F3EFE3',
                            300: '#E6DEC9',
                            900: '#1C1A14',
                        },
                        gold: {
                            500: '#C29F68',
                            600: '#A4824B',
                            700: '#836535',
                        },
                        charcoal: {
                            500: '#5A564C',
                            800: '#2C2A25',
                            950: '#151412',
                        }
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'Georgia', 'serif'],
                        sans: ['SF Pro Display', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Playfair Display Google Font for that luxury resort feel -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FAF6EE;
            color: #2C2A25;
            -webkit-tap-highlight-color: transparent;
            font-feature-settings: "cv02", "cv03", "cv04", "cv11";
        }
        /* Custom scrollbar to keep layout premium */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #FAF6EE;
        }
        ::-webkit-scrollbar-thumb {
            background: #E6DEC9;
            border-radius: 999px;
        }
    </style>
</head>
<body class="font-sans antialiased selection:bg-gold-500/10 selection:text-gold-700 relative">

    <!-- Toast Notification for Clipboards (Non-blocking premium feedback) -->
    <div id="toast-notification" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-charcoal-950 text-cream-50 text-xs tracking-wider uppercase py-3 px-6 rounded-full shadow-xl font-semibold opacity-0 pointer-events-none transition-all duration-300 z-50 flex items-center space-x-2">
        <svg class="w-4 h-4 text-gold-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
        </svg>
        <span id="toast-message">Copied to Clipboard</span>
    </div>

    <!-- App Wrapper -->
    <div class="max-w-md mx-auto min-h-screen flex flex-col relative px-4 pb-28 pt-6">
        
        <!-- HEADER -->
        <header class="mb-8 flex justify-between items-end">
            <div>
                <p id="current-date" class="text-xs uppercase tracking-widest text-charcoal-500 font-medium">Loading Date...</p>
                <h1 class="text-3xl font-serif font-semibold text-charcoal-950 mt-1">Shift Handover</h1>
            </div>
            <div class="text-right">
                <span id="shift-badge" class="inline-block text-[10px] uppercase tracking-widest bg-cream-200 text-gold-700 px-3 py-1.5 rounded-full font-semibold border border-cream-300">
                    Determining Shift...
                </span>
            </div>
        </header>

        <!-- SEARCH BAR (Ultra minimal) -->
        <div class="relative mb-8">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                <svg class="w-4 h-4 text-charcoal-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </span>
            <input 
                type="text" 
                id="search-input" 
                placeholder="Search room, title, or details..." 
                class="w-full bg-cream-50 text-charcoal-950 placeholder-charcoal-500 text-sm rounded-2xl pl-10 pr-10 py-3.5 focus:outline-none focus:ring-1 focus:ring-gold-500 transition-all border border-cream-200/60 shadow-sm"
            >
            <button 
                id="clear-search" 
                class="hidden absolute inset-y-0 right-0 flex items-center pr-3 text-charcoal-500 hover:text-charcoal-950"
            >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <!-- SEARCH MODE CONTAINER (Hidden by default) -->
        <div id="search-results-section" class="hidden mb-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs uppercase tracking-widest text-gold-700 font-bold">Search Results</h2>
                <button id="close-search-btn" class="text-xs text-charcoal-500 underline">Exit Search</button>
            </div>
            <div id="search-results-list" class="space-y-3">
                <!-- Search items injected here -->
            </div>
        </div>

        <!-- MAIN DASHBOARD CONTENT -->
        <div id="dashboard-content" class="space-y-8">
            
            <!-- SECTION 1: HANDOVER (WHAT SHOULD I KNOW?) -->
            <section>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs uppercase tracking-widest text-charcoal-500 font-bold">What should I know?</h2>
                    <span id="handover-count" class="text-[11px] text-charcoal-500 font-mono">0 active</span>
                </div>
                
                <div id="handover-list" class="space-y-3">
                    <!-- Dynamic cards inject -->
                </div>
            </section>

            <!-- SECTION 2: ISSUES (WHAT NEEDS ACTION?) -->
            <section>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs uppercase tracking-widest text-gold-700 font-bold">What needs action?</h2>
                    <span id="issue-count" class="text-[11px] text-gold-600 font-mono">0 open</span>
                </div>
                
                <div id="issue-list" class="space-y-3">
                    <!-- Dynamic cards inject -->
                </div>
            </section>

            <!-- NO ENTRIES STATE -->
            <div id="empty-state" class="hidden py-16 text-center">
                <p class="font-serif italic text-charcoal-500 text-lg">Perfect quiet at the Desk.</p>
                <p class="text-xs text-charcoal-500 mt-2">All handovers resolved or expired.</p>
            </div>

            <!-- DUAL TAB ACTIONS: REPORTS & HISTORY -->
            <div class="pt-6 border-t border-cream-200 flex justify-center space-x-3">
                <button id="view-reports-trigger" class="text-xs tracking-wider uppercase text-charcoal-500 hover:text-gold-700 flex items-center space-x-1.5 py-2.5 px-4 rounded-full bg-cream-50 hover:bg-cream-200 transition-colors border border-cream-200">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <span>Generate Reports</span>
                </button>
                <button id="view-history-trigger" class="text-xs tracking-wider uppercase text-charcoal-500 hover:text-gold-700 flex items-center space-x-1.5 py-2.5 px-4 rounded-full bg-cream-50 hover:bg-cream-200 transition-colors border border-cream-200">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span>History Log</span>
                </button>
            </div>
        </div>

        <!-- NEW ENTRY SHEET (ACCORDION/POPUP FOR MOBILE CONVENIENCE) -->
        <div id="fab-overlay" class="fixed inset-0 bg-charcoal-950/40 backdrop-blur-sm z-40 hidden transition-opacity duration-300 opacity-0"></div>
        
        <!-- FLOATING ACTION SHEET -->
        <div id="entry-sheet" class="fixed inset-x-0 bottom-0 max-w-md mx-auto bg-cream-50 rounded-t-[2.5rem] shadow-2xl z-50 transform translate-y-full transition-transform duration-300 ease-out border-t border-cream-200 overflow-y-auto max-h-[92vh]">
            <!-- Sheet handle indicator -->
            <div class="w-12 h-1 bg-cream-300 rounded-full mx-auto my-3.5 flex-shrink-0"></div>
            
            <div class="px-6 pb-8 pt-2">
                <!-- Step 1: Selection Mode -->
                <div id="sheet-selection-step" class="space-y-6">
                    <h3 class="text-center font-serif text-xl font-medium text-charcoal-950">New Entry</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <button id="choose-handover-btn" class="flex flex-col items-center justify-center p-6 bg-cream-100 rounded-2xl hover:bg-cream-200 border border-cream-200/60 transition-colors group">
                            <span class="p-3 bg-white rounded-full text-gold-600 shadow-sm group-hover:scale-105 transition-transform">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                            </span>
                            <span class="mt-3 font-serif font-medium text-charcoal-950 text-sm">Handover</span>
                            <span class="text-[11px] text-charcoal-500 mt-1">Temporary Info</span>
                        </button>
                        <button id="choose-issue-btn" class="flex flex-col items-center justify-center p-6 bg-cream-100 rounded-2xl hover:bg-cream-200 border border-cream-200/60 transition-colors group">
                            <span class="p-3 bg-white rounded-full text-red-600 shadow-sm group-hover:scale-105 transition-transform">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                                </svg>
                            </span>
                            <span class="mt-3 font-serif font-medium text-charcoal-950 text-sm">Action Issue</span>
                            <span class="text-[11px] text-charcoal-500 mt-1">Needs Resolving</span>
                        </button>
                    </div>
                    <button id="cancel-sheet-btn" class="w-full py-3.5 text-center text-sm font-medium text-charcoal-500 hover:text-charcoal-950">
                        Cancel
                    </button>
                </div>

                <!-- Step 2A: Create Handover Form -->
                <div id="handover-form-step" class="hidden space-y-4">
                    <div class="flex justify-between items-center">
                        <button class="back-to-selection text-sm text-gold-600 flex items-center space-x-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            <span>Back</span>
                        </button>
                        <h3 class="font-serif text-lg font-medium text-charcoal-950">New Handover</h3>
                        <div class="w-12"></div>
                    </div>

                    <form id="handover-form" class="space-y-4">
                        <input type="hidden" id="edit-handover-id">
                        <div>
                            <label class="block text-[10px] uppercase tracking-widest text-charcoal-500 mb-1 font-semibold">Title *</label>
                            <input type="text" id="handover-title" required placeholder="e.g., VIP Honeymoon, Late Arrival" class="w-full bg-cream-100 border-none rounded-xl py-3 px-4 text-charcoal-950 placeholder-charcoal-500/70 focus:ring-1 focus:ring-gold-500 text-sm">
                            <!-- Tap Quick Suggestions -->
                            <div class="flex flex-wrap gap-1.5 mt-2">
                                <button type="button" onclick="applySuggestion('handover-title', 'VIP Honeymoon')" class="text-[11px] bg-cream-200 hover:bg-cream-300 text-charcoal-800 px-2 py-1 rounded-md">VIP Arrival</button>
                                <button type="button" onclick="applySuggestion('handover-title', 'Late Check-out')" class="text-[11px] bg-cream-200 hover:bg-cream-300 text-charcoal-800 px-2 py-1 rounded-md">Late Out</button>
                                <button type="button" onclick="applySuggestion('handover-title', 'Airport Pickup')" class="text-[11px] bg-cream-200 hover:bg-cream-300 text-charcoal-800 px-2 py-1 rounded-md">Airport Pick</button>
                                <button type="button" onclick="applySuggestion('handover-title', 'Payment Pending')" class="text-[11px] bg-cream-200 hover:bg-cream-300 text-charcoal-800 px-2 py-1 rounded-md">Pending Pay</button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] uppercase tracking-widest text-charcoal-500 mb-1 font-semibold">Room</label>
                                <input type="text" id="handover-room" placeholder="e.g., 204" class="w-full bg-cream-100 border-none rounded-xl py-3 px-4 text-charcoal-950 placeholder-charcoal-500/70 focus:ring-1 focus:ring-gold-500 text-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] uppercase tracking-widest text-charcoal-500 mb-1 font-semibold">Priority</label>
                                <div class="grid grid-cols-3 bg-cream-100 rounded-xl p-0.5 text-xs text-center font-medium">
                                    <label class="cursor-pointer py-2.5 rounded-lg transition-colors" id="label-h-norm">
                                        <input type="radio" name="handover-priority" value="Normal" checked class="sr-only" onclick="updatePriorityUi('handover')">
                                        Normal
                                    </label>
                                    <label class="cursor-pointer py-2.5 rounded-lg transition-colors" id="label-h-imp">
                                        <input type="radio" name="handover-priority" value="Important" class="sr-only" onclick="updatePriorityUi('handover')">
                                        Imp
                                    </label>
                                    <label class="cursor-pointer py-2.5 rounded-lg transition-colors" id="label-h-crit">
                                        <input type="radio" name="handover-priority" value="Critical" class="sr-only" onclick="updatePriorityUi('handover')">
                                        Crit
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- NEW: Completion Method Selection -->
                        <div>
                            <label class="block text-[10px] uppercase tracking-widest text-charcoal-500 mb-1 font-semibold">Completion Method</label>
                            <div class="grid grid-cols-2 bg-cream-100 rounded-xl p-0.5 text-xs text-center font-medium">
                                <label class="cursor-pointer py-2.5 rounded-lg transition-all" id="label-method-auto">
                                    <input type="radio" name="handover-method" value="Auto" checked class="sr-only" onclick="updateMethodUi()">
                                    Auto Expire
                                </label>
                                <label class="cursor-pointer py-2.5 rounded-lg transition-all" id="label-method-manual">
                                    <input type="radio" name="handover-method" value="Manual" class="sr-only" onclick="updateMethodUi()">
                                    Complete Manually
                                </label>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] uppercase tracking-widest text-charcoal-500 mb-1 font-semibold">Description</label>
                            <textarea id="handover-desc" rows="2" placeholder="Any extra instructions..." class="w-full bg-cream-100 border-none rounded-xl py-3 px-4 text-charcoal-950 placeholder-charcoal-500/70 focus:ring-1 focus:ring-gold-500 text-sm"></textarea>
                        </div>

                        <div id="handover-expiry-container">
                            <label class="block text-[10px] uppercase tracking-widest text-charcoal-500 mb-1 font-semibold">Expires</label>
                            <div class="grid grid-cols-3 bg-cream-100 rounded-xl p-0.5 text-xs text-center font-medium">
                                <label class="cursor-pointer py-2.5 rounded-lg transition-colors" id="label-exp-today">
                                    <input type="radio" name="handover-expiry" value="today" class="sr-only" onclick="updateExpiryUi()">
                                    Tonight
                                </label>
                                <label class="cursor-pointer py-2.5 rounded-lg transition-colors" id="label-exp-tomorrow">
                                    <input type="radio" name="handover-expiry" value="tomorrow" checked class="sr-only" onclick="updateExpiryUi()">
                                    Tomorrow
                                </label>
                                <label class="cursor-pointer py-2.5 rounded-lg transition-colors" id="label-exp-3days">
                                    <input type="radio" name="handover-expiry" value="3days" class="sr-only" onclick="updateExpiryUi()">
                                    3 Days
                                </label>
                            </div>
                        </div>

                        <div class="flex space-x-3 pt-2">
                            <button type="button" class="flex-1 py-3.5 bg-cream-200 text-charcoal-950 rounded-xl text-sm font-medium hover:bg-cream-300 transition-colors close-sheet-btn">Cancel</button>
                            <button type="submit" class="flex-1 py-3.5 bg-gold-600 hover:bg-gold-700 text-white rounded-xl text-sm font-medium shadow-sm transition-colors">Save Handover</button>
                        </div>
                    </form>
                </div>

                <!-- Step 2B: Create Issue Form -->
                <div id="issue-form-step" class="hidden space-y-4">
                    <div class="flex justify-between items-center">
                        <button class="back-to-selection text-sm text-gold-600 flex items-center space-x-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            <span>Back</span>
                        </button>
                        <h3 class="font-serif text-lg font-medium text-charcoal-950">New Action Issue</h3>
                        <div class="w-12"></div>
                    </div>

                    <form id="issue-form" class="space-y-4">
                        <input type="hidden" id="edit-issue-id">
                        <div>
                            <label class="block text-[10px] uppercase tracking-widest text-charcoal-500 mb-1 font-semibold">Issue *</label>
                            <input type="text" id="issue-title" required placeholder="e.g., AC leaking, Missing towels" class="w-full bg-cream-100 border-none rounded-xl py-3 px-4 text-charcoal-950 placeholder-charcoal-500/70 focus:ring-1 focus:ring-gold-500 text-sm">
                            <div class="flex flex-wrap gap-1.5 mt-2">
                                <button type="button" onclick="applySuggestion('issue-title', 'AC not cooling')" class="text-[11px] bg-cream-200 hover:bg-cream-300 text-charcoal-800 px-2 py-1 rounded-md">AC Issue</button>
                                <button type="button" onclick="applySuggestion('issue-title', 'Housekeeping missed')" class="text-[11px] bg-cream-200 hover:bg-cream-300 text-charcoal-800 px-2 py-1 rounded-md">Missed HK</button>
                                <button type="button" onclick="applySuggestion('issue-title', 'Billing Correction')" class="text-[11px] bg-cream-200 hover:bg-cream-300 text-charcoal-800 px-2 py-1 rounded-md">Billing</button>
                                <button type="button" onclick="applySuggestion('issue-title', 'Safe box locked')" class="text-[11px] bg-cream-200 hover:bg-cream-300 text-charcoal-800 px-2 py-1 rounded-md">Safe Locked</button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] uppercase tracking-widest text-charcoal-500 mb-1 font-semibold">Room</label>
                                <input type="text" id="issue-room" placeholder="e.g., 512" class="w-full bg-cream-100 border-none rounded-xl py-3 px-4 text-charcoal-950 placeholder-charcoal-500/70 focus:ring-1 focus:ring-gold-500 text-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] uppercase tracking-widest text-charcoal-500 mb-1 font-semibold">Priority</label>
                                <div class="grid grid-cols-3 bg-cream-100 rounded-xl p-0.5 text-xs text-center font-medium">
                                    <label class="cursor-pointer py-2.5 rounded-lg transition-colors" id="label-i-norm">
                                        <input type="radio" name="issue-priority" value="Normal" checked class="sr-only" onclick="updatePriorityUi('issue')">
                                        Normal
                                    </label>
                                    <label class="cursor-pointer py-2.5 rounded-lg transition-colors" id="label-i-imp">
                                        <input type="radio" name="issue-priority" value="Important" class="sr-only" onclick="updatePriorityUi('issue')">
                                        Imp
                                    </label>
                                    <label class="cursor-pointer py-2.5 rounded-lg transition-colors" id="label-i-crit">
                                        <input type="radio" name="issue-priority" value="Critical" class="sr-only" onclick="updatePriorityUi('issue')">
                                        Crit
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] uppercase tracking-widest text-charcoal-500 mb-1 font-semibold">Department Responsible</label>
                            <div class="grid grid-cols-5 bg-cream-100 rounded-xl p-0.5 text-[10px] text-center font-medium">
                                <label class="cursor-pointer py-2.5 rounded-lg transition-all" id="label-dept-hk">
                                    <input type="radio" name="issue-dept" value="Housekeeping" checked class="sr-only" onclick="updateDeptUi()">
                                    HK
                                </label>
                                <label class="cursor-pointer py-2.5 rounded-lg transition-all" id="label-dept-eng">
                                    <input type="radio" name="issue-dept" value="Engineering" class="sr-only" onclick="updateDeptUi()">
                                    ENG
                                </label>
                                <label class="cursor-pointer py-2.5 rounded-lg transition-all" id="label-dept-fo">
                                    <input type="radio" name="issue-dept" value="Front Office" class="sr-only" onclick="updateDeptUi()">
                                    FO
                                </label>
                                <label class="cursor-pointer py-2.5 rounded-lg transition-all" id="label-dept-rest">
                                    <input type="radio" name="issue-dept" value="Restaurant" class="sr-only" onclick="updateDeptUi()">
                                    FB
                                </label>
                                <label class="cursor-pointer py-2.5 rounded-lg transition-all" id="label-dept-spa">
                                    <input type="radio" name="issue-dept" value="Spa" class="sr-only" onclick="updateDeptUi()">
                                    SPA
                                </label>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] uppercase tracking-widest text-charcoal-500 mb-1 font-semibold">Description</label>
                            <textarea id="issue-desc" rows="2" placeholder="Details for resolving team..." class="w-full bg-cream-100 border-none rounded-xl py-3 px-4 text-charcoal-950 placeholder-charcoal-500/70 focus:ring-1 focus:ring-gold-500 text-sm"></textarea>
                        </div>

                        <div class="flex space-x-3 pt-2">
                            <button type="button" class="flex-1 py-3.5 bg-cream-200 text-charcoal-950 rounded-xl text-sm font-medium hover:bg-cream-300 transition-colors close-sheet-btn">Cancel</button>
                            <button type="submit" class="flex-1 py-3.5 bg-gold-600 hover:bg-gold-700 text-white rounded-xl text-sm font-medium shadow-sm transition-colors">Create Issue</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- STICKY FLOATING ACTION BUTTON -->
        <div class="fixed bottom-6 right-6 z-30">
            <button id="add-entry-fab" class="w-14 h-14 bg-charcoal-950 text-cream-50 rounded-full flex items-center justify-center shadow-lg hover:bg-gold-600 active:scale-95 transition-all duration-150">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
            </button>
        </div>

        <!-- NEW: REPORTS MODAL -->
        <div id="reports-modal" class="fixed inset-0 bg-cream-100 z-50 hidden overflow-y-auto">
            <div class="max-w-md mx-auto px-4 py-6 min-h-screen flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-serif font-semibold text-charcoal-950">Shift Reports</h2>

                    <button id="copy-report-action-btn" class="mt-4 w-full py-4 bg-gold-600 hover:bg-gold-700 text-white font-medium rounded-xl text-sm shadow-md transition-colors flex items-center justify-center space-x-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                        </svg>
                        <span id="copy-report-btn-label">Copy Detailed Report</span>

        <!-- HISTORY MODAL (FULL SCREEN SLIDEOVER) -->
        <div id="history-modal" class="fixed inset-0 bg-cream-100 z-50 hidden overflow-y-auto">
            <div class="max-w-md mx-auto px-4 py-6 min-h-screen flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-serif font-semibold text-charcoal-950">Archive Logs</h2>
                    <button id="close-history-btn" class="w-8 h-8 rounded-full bg-cream-200 flex items-center justify-center text-charcoal-950 hover:bg-cream-300">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>

                    </button>
                </div>

                <!-- History Navigation Tab (Updated to 3 columns to separate Completed and Expired handovers) -->
                <div class="grid grid-cols-3 bg-cream-200 p-1 rounded-xl text-[10px] font-semibold mb-6 text-center">
                    <button id="tab-resolved-issues" class="py-2.5 rounded-lg text-charcoal-950 bg-white shadow-sm transition-all">
                        Resolved Issues
                    </button>
                    <button id="tab-completed-handovers" class="py-2.5 rounded-lg text-charcoal-500 hover:text-charcoal-950 transition-all">
                        Completed
                    </button>
                    <button id="tab-expired-handovers" class="py-2.5 rounded-lg text-charcoal-500 hover:text-charcoal-950 transition-all">
                        Expired
                    </button>
                </div>

                <!-- History Content -->
                <div class="flex-1">
                    <div id="history-list" class="space-y-3">
                        <!-- Archived items will live here -->
                    </div>
                </div>

                <div class="mt-8 text-center">
                    <button id="clear-history-btn" class="text-xs text-red-500 hover:text-red-700 tracking-wider uppercase font-semibold">
                        Clear This Archive Log

    <!-- MAIN APP JAVASCRIPT -->
    <script>
        // ----- CONFIGURATION: PLUG IN YOUR GOOGLE SYNC HERE ------ //
  const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbyp_IcWvkioQC9elfXiqcwLq15TRQxF1VcYRq0Z55pI_JnD1ctbFKuT9Y76iAwWO992qA/execv";
        
        // ----------------- STATE & STORAGE -----------------
        let handovers = [];
        let issues = [];
        let currentHistoryTab = 'resolved-issues';
        let currentReportType = 'detailed'; // or 'whatsapp'
        
// ==========================================
  // CORE CLOUD SYNC ENGINE (API CALLS)
  // ==========================================
  async function fetchCloudData() {
      if (!CLOUD_API_URL || CLOUD_API_URL.includes("YOUR_GOOGLE")) {
          console.log("Running in offline mode.");
          loadData(); 
          return;
      }
      try {
          const response = await fetch(`${CLOUD_API_URL}?action=getData`);
          const data = await response.json();
          handovers = data.handovers || [];
          issues = data.issues || [];
          
          localStorage.setItem('shift_handovers', JSON.stringify(handovers));
          localStorage.setItem('shift_issues', JSON.stringify(issues));
          
          renderDashboard();
      } catch (error) {
          console.error("Cloud fetch failed, using local backup:", error);
          loadData();
      }
  }

async function saveToCloud(actionType, payload) {
    if (actionType === 'addHandover') handovers.unshift(payload);
    if (actionType === 'addIssue') issues.unshift(payload);
    
    localStorage.setItem('shift_handovers', JSON.stringify(handovers));
    localStorage.setItem('shift_issues', JSON.stringify(issues));
    renderDashboard();

    if (!CLOUD_API_URL || CLOUD_API_URL.includes("YOUR_GOOGLE")) {
        return;
    }

    try {
        await fetch(CLOUD_API_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            // 👇 FIX: Sends the complete arrays so Google script can map them perfectly
            body: JSON.stringify({ 
                handovers: handovers, 
                issues: issues 
            })
        });
    } catch (error) {
        console.error("Cloud save failed:", error);
    }
}
        function seedDataIfEmpty() {
            if (!localStorage.getItem('shift_handovers')) {
                localStorage.setItem('shift_handovers', JSON.stringify([]));
            }
            if (!localStorage.getItem('shift_issues')) {
                localStorage.setItem('shift_issues', JSON.stringify([]));
            }
        }

        function loadData() {
            seedDataIfEmpty();
            handovers = JSON.parse(localStorage.getItem('shift_handovers')) || [];
            issues = JSON.parse(localStorage.getItem('shift_issues')) || [];
            
            // Clean auto-expired handovers to archive status
            cleanExpiredHandovers();
            
            renderDashboard();
        }

        function saveData() {
            localStorage.setItem('shift_handovers', JSON.stringify(handovers));
            localStorage.setItem('shift_issues', JSON.stringify(issues));
        }

        function cleanExpiredHandovers() {
    const now = Date.now();
    let changed = false;
    
    handovers = handovers.map(h => {
        // --- ADD THIS LINE ---
        if (!h) return h; 
        
        // Now it is safe to check the properties
        if (h.method !== 'Manual' && h.expiresAt < now && !h.expired && !h.completed) {
            h.expired = true;
            h.expiredAt = now;
            changed = true;
        }
        return h;
    });
    
    if (changed) {
        saveData();
    }
}
    

        // ----------------- DATE & SHIFT UTILS -----------------
        function getCurrentDateString() {
            const dateObj = new Date();
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return `${days[dateObj.getDay()]}, ${months[dateObj.getMonth()]} ${dateObj.getDate()}, ${dateObj.getFullYear()}`;
        }

        function determineShiftName() {
            const dateObj = new Date();
            const hour = dateObj.getHours();
            if (hour >= 7 && hour < 15) {
                return 'Morning Shift';
            } else if (hour >= 15 && hour < 23) {
                return 'Evening Shift';
            } else {
                return 'Night Shift';
            }
        }

        function getShiftTransitionText() {
            const current = determineShiftName();
            if (current === 'Morning Shift') return 'Morning → Evening';
            if (current === 'Evening Shift') return 'Evening → Night';
            return 'Night → Morning';
        }

        function updateDateTime() {
            document.getElementById('current-date').textContent = getCurrentDateString();
            document.getElementById('shift-badge').textContent = determineShiftName();
        }

        // ----------------- SUGGESTIONS HELPER -----------------
        function applySuggestion(targetId, val) {
            document.getElementById(targetId).value = val;
        }

        // ----------------- UI STATE TOGGLES (NEW METHOD & PRIORITY) -----------------
        function updateMethodUi() {
            const methodVal = document.querySelector('input[name="handover-method"]:checked').value;
            const autoLabel = document.getElementById('label-method-auto');
            const manualLabel = document.getElementById('label-method-manual');
            const expiryContainer = document.getElementById('handover-expiry-container');

            [autoLabel, manualLabel].forEach(l => {
                if (l) l.className = "cursor-pointer py-2.5 rounded-lg transition-all";
            });

            if (methodVal === 'Auto' && autoLabel) {
                autoLabel.className = "cursor-pointer py-2.5 rounded-lg transition-all bg-cream-900 text-cream-50 font-bold shadow-sm";
                expiryContainer.classList.remove('hidden');
            } else if (methodVal === 'Manual' && manualLabel) {
                manualLabel.className = "cursor-pointer py-2.5 rounded-lg transition-all bg-cream-900 text-cream-50 font-bold shadow-sm";
                expiryContainer.classList.add('hidden');
            }
        }

        function updatePriorityUi(type) {
            const priorityVal = document.querySelector(`input[name="${type}-priority"]:checked`).value;
            const normLabel = document.getElementById(`label-${type[0]}-norm`);
            const impLabel = document.getElementById(`label-${type[0]}-imp`);
            const fontCritLabel = document.getElementById(`label-${type[0]}-crit`);

            [normLabel, impLabel, fontCritLabel].forEach(l => {
                if (l) l.className = "cursor-pointer py-2.5 rounded-lg transition-all";
            });

            if (priorityVal === 'Normal' && normLabel) {
                normLabel.className = "cursor-pointer py-2.5 rounded-lg transition-all bg-cream-300/80 text-charcoal-950 font-bold shadow-sm";
            } else if (priorityVal === 'Important' && impLabel) {
                impLabel.className = "cursor-pointer py-2.5 rounded-lg transition-all bg-gold-500 text-white font-bold shadow-sm";
            } else if (priorityVal === 'Critical' && fontCritLabel) {
                fontCritLabel.className = "cursor-pointer py-2.5 rounded-lg transition-all bg-red-600 text-white font-bold shadow-sm";
            }
        }

        function updateExpiryUi() {
            const expVal = document.querySelector('input[name="handover-expiry"]:checked').value;
            const tLabel = document.getElementById('label-exp-today');
            const tmLabel = document.getElementById('label-exp-tomorrow');
            const thLabel = document.getElementById('label-exp-3days');

            [tLabel, tmLabel, thLabel].forEach(l => {
                if (l) l.className = "cursor-pointer py-2.5 rounded-lg transition-all";
            });

            if (expVal === 'today' && tLabel) {
                tLabel.className = "cursor-pointer py-2.5 rounded-lg transition-all bg-cream-300 text-charcoal-950 font-bold shadow-sm";
            } else if (expVal === 'tomorrow' && tmLabel) {
                tmLabel.className = "cursor-pointer py-2.5 rounded-lg transition-all bg-cream-300 text-charcoal-950 font-bold shadow-sm";
            } else if (expVal === '3days' && thLabel) {
                thLabel.className = "cursor-pointer py-2.5 rounded-lg transition-all bg-cream-300 text-charcoal-950 font-bold shadow-sm";
            }
        }

        function updateDeptUi() {
            const depts = ['hk', 'eng', 'fo', 'rest', 'spa'];
            const checkedVal = document.querySelector('input[name="issue-dept"]:checked').value;

            depts.forEach(deptId => {
                const label = document.getElementById(`label-dept-${deptId}`);
                if (label) label.className = "cursor-pointer py-2.5 rounded-lg transition-all";
            });

            const activeMap = {
                'Housekeeping': 'label-dept-hk',
                'Engineering': 'label-dept-eng',
                'Front Office': 'label-dept-fo',
                'Restaurant': 'label-dept-rest',
                'Spa': 'label-dept-spa'
            };

            const targetLabel = document.getElementById(activeMap[checkedVal]);
            if (targetLabel) {
                targetLabel.className = "cursor-pointer py-2.5 rounded-lg transition-all bg-cream-900 text-cream-50 font-bold shadow-sm";
            }
        }

        // ----------------- RENDER ENGINE -----------------
        function renderDashboard() {
            const hoList = document.getElementById('handover-list');
            const isList = document.getElementById('issue-list');
            
            hoList.innerHTML = '';
            isList.innerHTML = '';

            // Handovers must not be expired, and must not be marked complete
            const activeHandovers = handovers.filter(h => h && !h.expired && !h.completed);
            const openIssues = issues.filter(i => i && !i.resolved);

            document.getElementById('handover-count').textContent = `${activeHandovers.length} active`;
            document.getElementById('issue-count').textContent = `${openIssues.length} open`;

            if (activeHandovers.length === 0 && openIssues.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('empty-state').classList.add('hidden');
            }

            activeHandovers.forEach(ho => {
                const card = createHandoverCard(ho);
                hoList.appendChild(card);
            });

            openIssues.forEach(is => {
                const card = createIssueCard(is);
                isList.appendChild(card);
            });
        }

        function createHandoverCard(ho) {
            const card = document.createElement('div');
            card.className = "bg-cream-50 rounded-2xl p-5 border border-cream-200/50 shadow-sm relative group hover:border-gold-500/30 transition-all";
            
            let priorityBadge = '';
            if (ho.priority === 'Important') {
                priorityBadge = `<span class="text-[9px] uppercase tracking-wider bg-gold-500/10 text-gold-700 px-2.5 py-0.5 rounded-md font-bold">Important</span>`;
            } else if (ho.priority === 'Critical') {
                priorityBadge = `<span class="text-[9px] uppercase tracking-wider bg-red-500/10 text-red-600 px-2.5 py-0.5 rounded-md font-bold">Critical</span>`;
            }

            const roomBadge = ho.room ? `<span class="font-mono text-xs text-charcoal-500 bg-cream-200/60 px-2.5 py-0.5 rounded-md">Rm ${ho.room}</span>` : '';
            const desc = ho.desc ? `<p class="text-xs text-charcoal-500 mt-2 leading-relaxed whitespace-pre-wrap">${ho.desc}</p>` : '';
            
            // Method details/Expiry display
            let footerMeta = '';
            if (ho.method === 'Manual') {
                footerMeta = `<span class="inline-flex items-center text-gold-700 font-semibold"><span class="w-1.5 h-1.5 rounded-full bg-gold-500 mr-1.5 animate-pulse"></span>Complete Manually</span>`;
            } else {
                const expDateStr = new Date(ho.expiresAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                footerMeta = `<span class="flex items-center"><svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>Expires ${expDateStr}</span>`;
            }

            // If Complete Manually is set, add a beautiful "✓ Done" button at the bottom of the card
            let actionBtnMarkup = '';
            if (ho.method === 'Manual') {
                actionBtnMarkup = `
                    <button onclick="completeHandover('${ho.id}')" class="text-[11px] bg-gold-600 hover:bg-gold-700 text-white font-medium px-4 py-2 rounded-xl flex items-center space-x-1.5 shadow-sm transition-all active:scale-95">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                        <span>Done</span>
                    </button>
                `;
            }

            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="space-y-1">
                        <div class="flex flex-wrap gap-2 items-center">
                            ${roomBadge}
                            ${priorityBadge}
                        </div>
                        <h4 class="font-serif font-semibold text-[15px] text-charcoal-950 mt-1">${ho.title}</h4>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="editHandover('${ho.id}')" class="text-charcoal-500 hover:text-charcoal-950 p-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        </button>
                        <button onclick="deleteHandover('${ho.id}')" class="text-charcoal-500 hover:text-red-600 p-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
                ${desc}
                <div class="mt-5 flex justify-between items-center pt-3 border-t border-cream-200/40 text-[10px] text-charcoal-500 font-medium">
                    <div class="flex flex-col space-y-0.5">
                        <span>Added ${timeAgo(ho.createdAt)}</span>
                        ${footerMeta}
                    </div>
                    ${actionBtnMarkup}
                </div>
            `;
            return card;
        }

        function createIssueCard(issue) {
            const card = document.createElement('div');
            card.className = "bg-white rounded-2xl p-5 border border-cream-200/50 shadow-sm relative group hover:border-gold-500/30 transition-all";

            let priorityBadge = '';
            if (issue.priority === 'Important') {
                priorityBadge = `<span class="text-[9px] uppercase tracking-wider bg-gold-500/10 text-gold-700 px-2.5 py-0.5 rounded-md font-bold">Important</span>`;
            } else if (issue.priority === 'Critical') {
                priorityBadge = `<span class="text-[9px] uppercase tracking-wider bg-red-500/10 text-red-600 px-2.5 py-0.5 rounded-md font-bold">Critical</span>`;
            }

            const roomBadge = issue.room ? `<span class="font-mono text-xs text-charcoal-500 bg-cream-100 px-2.5 py-0.5 rounded-md">Rm ${issue.room}</span>` : '';
            const deptBadge = `<span class="text-[9px] uppercase tracking-widest text-charcoal-500 bg-cream-200 px-2.5 py-0.5 rounded-md font-bold">${issue.dept}</span>`;
            const desc = issue.desc ? `<p class="text-xs text-charcoal-500 mt-2 leading-relaxed whitespace-pre-wrap">${issue.desc}</p>` : '';

            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="space-y-1">
                        <div class="flex flex-wrap gap-2 items-center">
                            ${roomBadge}
                            ${deptBadge}
                            ${priorityBadge}
                        </div>
                        <h4 class="font-serif font-semibold text-[15px] text-charcoal-950 mt-1">${issue.title}</h4>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="editIssue('${issue.id}')" class="text-charcoal-500 hover:text-charcoal-950 p-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        </button>
                    </div>
                </div>
                ${desc}
                <div class="mt-5 flex justify-between items-center pt-3 border-t border-cream-100">
                    <span class="text-[10px] text-charcoal-500">Opened ${timeAgo(issue.createdAt)}</span>
                    <button onclick="resolveIssue('${issue.id}')" class="text-[11px] bg-gold-600 hover:bg-gold-700 text-white font-medium px-4 py-2 rounded-xl flex items-center space-x-1.5 shadow-sm transition-colors active:scale-95">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                        <span>Resolve</span>
                    </button>
                </div>
            `;
            return card;
        }

        function timeAgo(pastTimestamp) {
            const diffMs = Date.now() - pastTimestamp;
            const diffMins = Math.floor(diffMs / (1000 * 60));
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            const diffHours = Math.floor(diffMins / 60);
            if (diffHours < 24) return `${diffHours}h ago`;
            return `${Math.floor(diffHours / 24)}d ago`;
        }

        // ----------------- ACTIONS (RESOLVE, DONE, EDIT, DELETE) -----------------
        function resolveIssue(id) {
            issues = issues.map(is => {
                if (!is) return is; // <--- ADD THIS: Skip if the item is null
                if (is.id === id) {
                    is.resolved = true;
                    is.resolvedAt = Date.now();
                }
                return is;
            });
            saveToCloud('resolveIssue', null);
            renderDashboard();
            triggerHapticFeedback();
            showToast('Issue Marked Resolved');
        }

        // Complete manual handover task action
        function completeHandover(id) {
            handovers = handovers.map(h => {
                 if (!h) return h; // <--- ADD THIS: Skip if the item is null
                if (h.id === id) {
                    h.completed = true;
                    h.completedAt = Date.now();
                 }
                return h;
            });

            saveToCloud('completeHandover', null);
            renderDashboard();
            triggerHapticFeedback();
            showToast('Handover Completed');
        }

        function deleteHandover(id) {
            handovers = handovers.filter(h => h && h.id !== id);
            saveToCloud('deleteHandover', null);
            renderDashboard();
            showToast('Handover Deleted');
        }

        function editHandover(id) {
            const ho = handovers.find(h => h && h.id === id); // <--- ADDED 'h &&' safety check
            if (!ho) return;

            openSheet();
            showStep('handover-form');

            document.getElementById('edit-handover-id').value = ho.id;
            document.getElementById('handover-title').value = ho.title;
            document.getElementById('handover-room').value = ho.room || '';
            document.getElementById('handover-desc').value = ho.desc || '';

            // Priority Radios
            document.querySelector(`input[name="handover-priority"][value="${ho.priority}"]`).checked = true;
            updatePriorityUi('handover');

            // Method Radio
            const methodVal = ho.method || 'Auto';
            document.querySelector(`input[name="handover-method"][value="${methodVal}"]`).checked = true;
            updateMethodUi();

            // Expiry Restore
            const now = Date.now();
            const diffHrs = (ho.expiresAt - now) / (1000 * 60 * 60);
            if (diffHrs <= 12) {
                document.querySelector(`input[name="handover-expiry"][value="today"]`).checked = true;
            } else if (diffHrs <= 36) {
                document.querySelector(`input[name="handover-expiry"][value="tomorrow"]`).checked = true;
            } else {
                document.querySelector(`input[name="handover-expiry"][value="3days"]`).checked = true;
            }
            updateExpiryUi();

            document.querySelector('#handover-form button[type="submit"]').textContent = "Update Handover";
        }

        function editIssue(id) {
            const issue = issues.find(i => i.id === id);
            if (!issue) return;

            openSheet();
            showStep('issue-form');

            document.getElementById('edit-issue-id').value = issue.id;

        function generateDetailedText() {
            const activeHandovers = handovers.filter(h => !h.expired && !h.completed);
            const openIssues = issues.filter(i => !i.resolved);

            // Sort issues by priority (Critical -> Important -> Normal)
            const sortedIssues = [...openIssues].sort((a, b) => {
                const priorityWeight = { 'Critical': 3, 'Important': 2, 'Normal': 1 };
                return (priorityWeight[b.priority] || 0) - (priorityWeight[a.priority] || 0);
            });

            let out = `📋 SHIFT HANDOVER\n`;
            out += `Date: ${getCurrentDateString()}\n`;
            out += `Shift: ${determineShiftName()}\n`;
            out += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
            out += `HANDOVERS\n`;

            if (activeHandovers.length === 0) {
                out += `• No active handovers\n`;
            } else {
                activeHandovers.forEach(ho => {
                    out += `• ${ho.title}\n`;
                    if (ho.room) out += `  Room ${ho.room}\n`;
                    if (ho.desc) out += `  ${ho.desc}\n`;
                });
            }

            out += `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
            out += `OPEN ISSUES\n`;

            if (sortedIssues.length === 0) {
                out += `• No open issues\n`;
            } else {
                let currentPriority = '';
                sortedIssues.forEach(is => {
                    if (is.priority !== currentPriority) {
                        currentPriority = is.priority;
                        const priorityEmoji = currentPriority === 'Critical' ? '🔴' : (currentPriority === 'Important' ? '🟡' : '⚪');
                        out += `\n${priorityEmoji} ${currentPriority}\n`;
                    }
                    out += `• ${is.room ? 'Room ' + is.room : 'General'}\n`;
                    out += `  ${is.title}\n`;
                    if (is.desc) out += `  ${is.desc}\n`;
                });
            }

            out += `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            out += `End of Report`;
            return out;
        }

        function generateWhatsappText() {
            const activeHandovers = handovers.filter(h => !h.expired && !h.completed);
            const openIssues = issues.filter(i => !i.resolved);

            let out = `🏨 Shift Update\n`;
            out += `${getShiftTransitionText()}\n\n`;

            if (activeHandovers.length === 0) {
                out += `• None\n`;

                activeHandovers.forEach(ho => {
                    const roomPart = ho.room ? ` | Rm ${ho.room}` : '';
                    out += `• ${ho.title}${roomPart}\n`;

            }

            out += `\n⚠️ Open Issues\n`;

            if (openIssues.length === 0) {
                out += `• None\n`;
            } else {
                openIssues.forEach(is => {
                    const roomPart = is.room ? `Rm ${is.room}` : 'General';

            out += `\nEnd.`;

        function unresolveIssue(id) {
            issues = issues.map(i => {

            saveData();
            renderHistoryItems();
            renderDashboard();

        function uncompleteHandover(id) {
            handovers = handovers.map(h => {
                if (h.id === id) {
                    h.completed = false;
                    h.completedAt = null;
                }
                return h;
            });
            saveData();
            renderHistoryItems();
            renderDashboard();
            showToast('Handover Reactivated');
        }

        function reactivateHandover(id) {
            handovers = handovers.map(h => {
                if (h.id === id) {
                    h.expired = false;
                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    tomorrow.setHours(12, 0, 0, 0);
                    h.expiresAt = tomorrow.getTime();
                }
                return h;
            });
            saveData();
            renderHistoryItems();
            renderDashboard();
            showToast('Handover Renewed');
        }

        // ----------------- EVENT LISTENER REGISTRATIONS -----------------
        fab.addEventListener('click', openSheet);
        overlay.addEventListener('click', closeSheet);
        document.getElementById('cancel-sheet-btn').addEventListener('click', closeSheet);
        document.querySelectorAll('.close-sheet-btn').forEach(btn => btn.addEventListener('click', closeSheet));

        document.getElementById('choose-handover-btn').addEventListener('click', () => showStep('handover-form'));
        document.getElementById('choose-issue-btn').addEventListener('click', () => showStep('issue-form'));

        document.querySelectorAll('.back-to-selection').forEach(btn => {
            btn.addEventListener('click', () => showStep('selection'));
        });

        // Initialize state colors properly on start
        updatePriorityUi('handover');
        updatePriorityUi('issue');
        updateExpiryUi();
        updateDeptUi();
        updateMethodUi();

        // Start App
        updateDateTime();
        setInterval(updateDateTime, 30000);
        fetchCloudData();

    </script>
</body>
</html>
